<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SVT Document</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; }

.container {
    width: 190mm;
    margin: auto;
    background: white;
    padding: 25px;
}

.header { text-align: center; }
.logo { width: 70px; }

input, textarea, select {
    width: 100%;
    border: 1px solid #ccc;
    font-size: 12px;
    padding: 4px;
    box-sizing: border-box;
}

textarea {
    white-space: pre-wrap;
    word-break: break-word;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
    table-layout: fixed;
}

th, td {
    border: 1px solid #444;
    padding: 6px;
    font-size: 12px;
}

.section { margin-top: 12px; }
.summary { text-align: right; margin-top: 15px; }

@media print {
    button { display: none; }
}
</style>
</head>

<body>

<div id="quote" class="container">

<div class="header">
<h2>SIDDHI VINAYAK TRADERS</h2>
<h3>QUOTATION</h3>
</div>

<div class="section">
Quotation No: <input id="qno"><br>
Date: <input type="date" id="today">
</div>

<div class="section">
<input id="clientName" placeholder="Client Name">
<textarea id="clientAddress" placeholder="Address"></textarea>
<input id="clientMobile" placeholder="Mobile">

<select id="clientState" onchange="calc()">
<option value="">Select State</option>
<option value="Uttar Pradesh">Uttar Pradesh</option>
<option value="Delhi">Delhi</option>
<option value="Haryana">Haryana</option>
<option value="Bihar">Bihar</option>
</select>
</div>

<table>
<thead>
<tr>
<th>Item</th>
<th>CAS</th>
<th>Pack</th>
<th>Qty</th>
<th>Unit</th>
<th>Rate</th>
<th>GST%</th>
<th>Total</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<button onclick="addRow()">+ Add Item</button>

<div class="summary">
<p>Subtotal: ₹ <span id="sub">0</span></p>
<p id="cgstRow">CGST: ₹ <span id="cgst">0</span></p>
<p id="sgstRow">SGST: ₹ <span id="sgst">0</span></p>
<p id="igstRow" style="display:none;">IGST: ₹ <span id="igst">0</span></p>
<h3>Total: ₹ <span id="grand">0</span></h3>
</div>

</div>

<script>

today.valueAsDate = new Date();

function addRow(){
let tr=document.createElement("tr");

tr.innerHTML=`
<td><input></td>
<td><input></td>
<td><input></td>
<td><input type="number" oninput="calc()"></td>
<td>
<select onchange="calc()">
<option>gm</option>
<option>kg</option>
</select>
</td>
<td><input type="number" oninput="calc()"></td>
<td><input value="18" oninput="calc()"></td>
<td class="total">0</td>
`;

tbody.appendChild(tr);

// ✅ IMPORTANT FIX
calc();
}

function calc(){

let sub=0,cgst=0,sgst=0,igst=0;

let isUP = clientState.value === "Uttar Pradesh";

document.querySelectorAll("#tbody tr").forEach(r=>{

let qty = Number(r.cells[3].children[0].value)||0;
let rate = Number(r.cells[5].children[0].value)||0;
let gst = Number(r.cells[6].children[0].value)||0;

let amt = qty * rate;
let gstVal = amt * gst / 100;

r.cells[7].innerText = (amt + gstVal).toFixed(2);

sub += amt;

if(isUP){
cgst += gstVal/2;
sgst += gstVal/2;
}else{
igst += gstVal;
}

});

let total = sub + cgst + sgst + igst;

document.getElementById("sub").innerText=sub.toFixed(2);
document.getElementById("cgst").innerText=cgst.toFixed(2);
document.getElementById("sgst").innerText=sgst.toFixed(2);
document.getElementById("igst").innerText=igst.toFixed(2);
document.getElementById("grand").innerText=total.toFixed(2);

cgstRow.style.display = isUP ? "block":"none";
sgstRow.style.display = isUP ? "block":"none";
igstRow.style.display = isUP ? "none":"block";
}

addRow();

</script>

</body>
</html>
