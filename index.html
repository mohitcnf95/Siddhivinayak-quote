<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quotation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { font-family: Arial; }
.container { width: 210mm; padding: 20px; }
.logo { width: 70px; }

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    border: 1px solid black;
    padding: 5px;
    text-align: center;
}

.no-print { margin-top: 10px; }

@media print {
    .no-print { display: none; }
}
</style>
</head>

<body>

<div id="quote" class="container">

<center>
<img src="logo.png" class="logo"><br>
<h2>SIDDHI VINAYAK TRADERS</h2>
<p>Firozabad, UP</p>
<h3>QUOTATION</h3>
</center>

Quotation No: <input value="A00001"><br><br>
Client Name: <input><br><br>

<table>
<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Unit</th>
<th>Rate</th>
<th>Total</th>
<th class="no-print"></th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<button class="no-print" onclick="addRow()">+ Add Item</button>

<h3>Total: ₹ <span id="grand">0</span></h3>

</div>

<button class="no-print" onclick="downloadPDF()">Download PDF</button>

<script>
function addRow() {
    let tr = document.createElement("tr");

    tr.innerHTML = `
    <td><input></td>
    <td><input type="number" oninput="calc()"></td>
    <td>
        <select>
            <option>gm</option>
            <option>mg</option>
            <option>kg</option>
            <option>ml</option>
        </select>
    </td>
    <td><input type="number" oninput="calc()"></td>
    <td class="total">0</td>
    <td class="no-print"><button onclick="del(this)">X</button></td>
    `;

    document.getElementById("tbody").appendChild(tr);
}

function del(btn) {
    btn.parentElement.parentElement.remove();
    calc();
}

function calc() {
    let rows = document.querySelectorAll("#tbody tr");
    let total = 0;

    rows.forEach(r => {
        let qty = Number(r.cells[1].children[0].value) || 0;
        let rate = Number(r.cells[3].children[0].value) || 0;

        let val = qty * rate;
        r.cells[4].innerText = val.toFixed(2);

        total += val;
    });

    document.getElementById("grand").innerText = total.toFixed(2);
}

function downloadPDF() {
    html2pdf().from(document.getElementById("quote")).save("Quotation.pdf");
}

addRow();
</script>

</body>
</html>
