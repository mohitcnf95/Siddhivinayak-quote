<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SVT Document</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; }

.container {
    width: 190mm;
    margin: auto;
    background: white;
    padding: 25px;
}

.header { text-align: center; }

input, textarea, select {
    width: 100%;
    border: 1px solid #ccc;
    font-size: 12px;
    padding: 4px;
}

textarea {
    white-space: pre-wrap;
    word-break: break-word;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
}

th, td {
    border: 1px solid #444;
    padding: 6px;
    font-size: 12px;
}

td input, td select {
    border: 1px solid #ccc;
}

/* SUMMARY */
.summary {
    text-align: right;
    margin-top: 15px;
}

@media print {
    button { display: none; }
}
</style>
</head>

<body>

<div id="quote" class="container">

<div class="header">
<h2>SIDDHI VINAYAK TRADERS</h2>
<h3>QUOTATION</h3>
</div>

<div>
Quotation No: <input id="qno"><br>
Date: <input type="date" id="today">
</div>

<div>
<input id="clientName" placeholder="Client Name">
<textarea id="clientAddress" placeholder="Address"></textarea>
<input id="clientMobile" placeholder="Mobile">

<select id="clientState" onchange="calc()">
<option value="">Select State</option>
<option value="Uttar Pradesh">Uttar Pradesh</option>
<option value="Delhi">Delhi</option>
<option value="Haryana">Haryana</option>
<option value="Maharashtra">Maharashtra</option>
<option value="Gujarat">Gujarat</option>
<option value="Rajasthan">Rajasthan</option>
<option value="Punjab">Punjab</option>
<option value="Bihar">Bihar</option>
<option value="Karnataka">Karnataka</option>
<option value="Tamil Nadu">Tamil Nadu</option>
<option value="West Bengal">West Bengal</option>
<option value="Madhya Pradesh">Madhya Pradesh</option>
<option value="Telangana">Telangana</option>
<option value="Kerala">Kerala</option>
<option value="Odisha">Odisha</option>
<option value="Jharkhand">Jharkhand</option>
<option value="Chhattisgarh">Chhattisgarh</option>
<option value="Assam">Assam</option>
</select>
</div>

<table>
<thead>
<tr>
<th>Item</th>
<th>CAS</th>
<th>Pack Size</th>
<th>Qty</th>
<th>Unit</th>
<th>Rate</th>
<th>GST%</th>
<th>Total</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<button onclick="addRow()">+ Add Item</button>

<div class="summary">
<p>Subtotal: ₹ <span id="sub">0</span></p>

<p id="cgstRow">CGST: ₹ <span id="cgst">0</span></p>
<p id="sgstRow">SGST: ₹ <span id="sgst">0</span></p>
<p id="igstRow" style="display:none;">IGST: ₹ <span id="igst">0</span></p>

<p>Round Off: ₹ <span id="round">0</span></p>

<h3>Total: ₹ <span id="grand">0</span></h3>

<p><b>Amount in Words:</b> <span id="words"></span></p>
</div>

</div>

<button onclick="preparePDF()">Download PDF</button>

<script>

// AUTO DATE
document.getElementById("today").valueAsDate = new Date();

// ADD ROW
function addRow(){
let tr=document.createElement("tr");

tr.innerHTML=`
<td><input></td>
<td><input></td>
<td><input placeholder="500gm"></td>
<td><input type="number" oninput="calc()"></td>
<td>
<select onchange="calc()">
<option>gm</option>
<option>mg</option>
<option>kg</option>
<option>ml</option>
<option>L</option>
</select>
</td>
<td><input type="number" oninput="calc()"></td>
<td><input value="18" oninput="calc()"></td>
<td class="total">0</td>
`;

document.getElementById("tbody").appendChild(tr);
}

// 🔥 FIXED CALCULATION
function calc(){

let rows = document.querySelectorAll("#tbody tr");

let sub = 0, cgst = 0, sgst = 0, igst = 0;

// FIXED STATE CHECK
let state = document.getElementById("clientState").value.trim().toLowerCase();
let isUP = (state === "uttar pradesh");

rows.forEach(r => {

let qty = Number(r.cells[3].children[0].value) || 0;
let rate = Number(r.cells[5].children[0].value) || 0;
let gst = Number(r.cells[6].children[0].value) || 0;

let amount = qty * rate;
let gstVal = amount * gst / 100;

let total = amount + gstVal;

r.cells[7].innerText = total.toFixed(2);

sub += amount;

if(isUP){
cgst += gstVal/2;
sgst += gstVal/2;
}else{
igst += gstVal;
}

});

// FINAL TOTAL
let total = sub + cgst + sgst + igst;

let rounded = Math.round(total);
let roundOff = rounded - total;

// DISPLAY
document.getElementById("sub").innerText = sub.toFixed(2);
document.getElementById("cgst").innerText = cgst.toFixed(2);
document.getElementById("sgst").innerText = sgst.toFixed(2);
document.getElementById("igst").innerText = igst.toFixed(2);
document.getElementById("round").innerText = roundOff.toFixed(2);
document.getElementById("grand").innerText = rounded.toFixed(2);

document.getElementById("cgstRow").style.display = isUP ? "block" : "none";
document.getElementById("sgstRow").style.display = isUP ? "block" : "none";
document.getElementById("igstRow").style.display = isUP ? "none" : "block";

document.getElementById("words").innerText = numberToWords(rounded);

}

// WORDS
function numberToWords(num){
const a=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten",
"Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
const b=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];

function convert(n){
if(n<20)return a[n];
if(n<100)return b[Math.floor(n/10)]+" "+a[n%10];
if(n<1000)return a[Math.floor(n/100)]+" Hundred "+convert(n%100);
if(n<1000000)return convert(Math.floor(n/1000))+" Thousand "+convert(n%1000);
return "";
}

return convert(num)+" Rupees Only";
}

// PDF
function preparePDF(){
html2pdf().from(document.getElementById("quote")).save();
}

// INIT
addRow();

</script>

</body>
</html>
