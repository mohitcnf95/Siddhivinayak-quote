<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SVT Quotation ERP</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { font-family: Arial; }

.container { width: 210mm; padding: 20px; }

.header { text-align: center; }

.logo { width: 80px; }

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    border: 1px solid black;
    padding: 6px;
    font-size: 12px;
    text-align: center;
}

input, select, textarea {
    width: 100%;
    border: none;
}

.section { margin-top: 10px; }

button { margin-top: 10px; padding: 8px; }
</style>
</head>

<body>

<div id="quote" class="container">

<!-- HEADER -->
<div class="header">
<img src="logo.png" class="logo"><br>
<h2>SIDDHI VINAYAK TRADERS</h2>
<h3>QUOTATION</h3>
</div>

<!-- AUTO NUMBER -->
<div class="section">
Ref No: <b id="ref"></b><br>
Date: <input type="date" id="date">
</div>

<!-- CUSTOMER -->
<div class="section">
Customer:<br>
<input id="custName" placeholder="Customer Name" oninput="saveCustomer()">
<textarea id="custAddr" placeholder="Address"></textarea>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>S.No</th>
<th>Product</th>
<th>Qty</th>
<th>Rate</th>
<th>GST%</th>
<th>Total</th>
<th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<button onclick="addRow()">+ Add Product</button>

<!-- TOTAL -->
<div class="section">
Subtotal: ₹ <span id="sub">0</span><br>
GST: ₹ <span id="gst">0</span><br>
<h3>Total: ₹ <span id="grand">0</span></h3>
<p><b>Amount in Words:</b> <span id="words"></span></p>
</div>

<!-- FOOTER -->
<div class="section">
Validity: 7 Days<br>
For Siddhi Vinayak Traders<br><br>
Authorized Signatory
</div>

</div>

<button onclick="saveQuote()">Save</button>
<button onclick="downloadPDF()">Download PDF</button>

<script>

// AUTO REF NO
let countRef = localStorage.getItem("ref") || 1;
document.getElementById("ref").innerText = "SVT/2026/" + countRef;

// ADD ROW
let rowCount = 1;

function addRow() {
    let tr = document.createElement("tr");

    tr.innerHTML = `
    <td>${rowCount++}</td>
    <td><input></td>
    <td><input type="number" oninput="calc()"></td>
    <td><input type="number" oninput="calc()"></td>
    <td><input type="number" value="18" oninput="calc()"></td>
    <td class="total">0</td>
    <td><button onclick="del(this)">X</button></td>
    `;

    tbody.appendChild(tr);
}

// DELETE
function del(btn) {
    btn.parentElement.parentElement.remove();
    calc();
}

// CALCULATION
function calc() {
    let rows = document.querySelectorAll("#tbody tr");
    let sub = 0, gst = 0;

    rows.forEach(r => {
        let qty = r.cells[2].children[0].value || 0;
        let rate = r.cells[3].children[0].value || 0;
        let g = r.cells[4].children[0].value || 0;

        let total = qty * rate;
        let gstVal = total * g / 100;

        r.cells[5].innerText = (total + gstVal).toFixed(2);

        sub += total;
        gst += gstVal;
    });

    document.getElementById("sub").innerText = sub.toFixed(2);
    document.getElementById("gst").innerText = gst.toFixed(2);
    document.getElementById("grand").innerText = (sub + gst).toFixed(2);

    document.getElementById("words").innerText = numberToWords(sub + gst);
}

// NUMBER TO WORDS
function numberToWords(num) {
    return num + " Rupees Only";
}

// SAVE CUSTOMER
function saveCustomer() {
    localStorage.setItem("custName", custName.value);
    localStorage.setItem("custAddr", custAddr.value);
}

// LOAD CUSTOMER
window.onload = function() {
    custName.value = localStorage.getItem("custName") || "";
    custAddr.value = localStorage.getItem("custAddr") || "";
    addRow();
}

// SAVE QUOTE
function saveQuote() {
    localStorage.setItem("ref", ++countRef);
    alert("Quotation Saved!");
}

// PDF
function downloadPDF() {
    html2pdf().from(document.getElementById("quote")).save("Quotation.pdf");
}

</script>

</body>
</html><br>
<p>Authorized Signatory</p>
</div>

</div>

<button onclick="downloadPDF()">Download PDF</button>

<script>

function addRow() {
    let tr = document.createElement("tr");

    tr.innerHTML = `
    <td><input></td>
    <td><input type="number" oninput="calc()"></td>
    <td><select><option>kg</option><option>gm</option></select></td>
    <td><input type="number" oninput="calc()"></td>
    <td class="total">0</td>
    <td><button onclick="del(this)">X</button></td>
    `;

    document.getElementById("tbody").appendChild(tr);
}

function del(btn) {
    btn.parentElement.parentElement.remove();
    calc();
}

function calc() {
    let rows = document.querySelectorAll("#tbody tr");
    let sub = 0;

    rows.forEach(r => {
        let qty = r.cells[1].children[0].value || 0;
        let price = r.cells[3].children[0].value || 0;

        let total = qty * price;
        r.cells[4].innerText = total.toFixed(2);

        sub += total;
    });

    document.getElementById("sub").innerText = sub.toFixed(2);

    let gst = document.getElementById("gst").value;
    let gstVal = sub * gst / 100;

    document.getElementById("gstVal").innerText = gstVal.toFixed(2);
    document.getElementById("grand").innerText = (sub + gstVal).toFixed(2);
}

function downloadPDF() {
    html2pdf().from(document.getElementById("quote")).save("Quotation.pdf");
}

addRow();

</script>

</body>
</html>
